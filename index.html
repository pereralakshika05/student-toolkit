<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Toolkit</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
</head>

<body>

<div class="app-wrapper">

<!-- NAVBAR -->

<nav class="navbar">

<div class="nav-logo">STUDENT HUB</div>

<div class="nav-links">

<button class="nav-btn active" onclick="showSection('ideas',this)">Ideas</button>

<button class="nav-btn" onclick="showSection('gpa',this)">GPA</button>

<button class="nav-btn" onclick="showSection('timer',this)">Timer</button>

<label class="dark-toggle">
<input type="checkbox" onclick="toggleDarkMode()"> Dark
</label>

</div>

</nav>

<!-- SIDEBAR -->

<aside class="sidebar">

<h3>Upcoming Events</h3>

<div class="event-item">
<div class="event-date">MAR 15</div>
<div class="event-title">Project Proposal</div>
</div>

<div class="event-item">
<div class="event-date">MAR 22</div>
<div class="event-title">Midterm Hackathon</div>
</div>

<div class="event-item">
<div class="event-date">APR 05</div>
<div class="event-title">Presentation</div>
</div>

</aside>

<!-- MAIN -->

<main class="main-content">

<div class="container">

<!-- IDEAS -->

<section id="section-ideas" class="app-section active">

<h1>Idea Board</h1>

<div class="input-card">

<input id="name" placeholder="Your name">

<input id="idea" placeholder="Your idea">

<button onclick="addIdea()">Post</button>

</div>

<div id="ideas-list"></div>

</section>

<!-- GPA -->

<section id="section-gpa" class="app-section">

<h1>GPA Calculator</h1>

<table class="gpa-table">

<thead>

<tr>
<th>Course</th>
<th>Credits</th>
<th>Grade</th>
</tr>

</thead>

<tbody id="gpa-rows">

<tr>

<td><input placeholder="Course"></td>

<td><input class="credits" type="number"></td>

<td>

<select class="grade">

<option value="4">A</option>
<option value="3">B</option>
<option value="2">C</option>
<option value="1">D</option>
<option value="0">F</option>

</select>

</td>

</tr>

</tbody>

</table>

<button onclick="addRow()">Add Course</button>

<button onclick="calculateGPA()">Calculate</button>

<h2 id="gpa-result"></h2>

</section>

<!-- TIMER -->

<section id="section-timer" class="app-section">

<h1>Study Timer</h1>

<div class="timer-circle">

<div id="timer-display">25:00</div>

</div>

<div class="timer-buttons">

<button onclick="startTimer()">Start</button>

<button onclick="resetTimer()">Reset</button>

</div>

</section>

</div>

</main>

</div>

<script src="script.js"></script>

</body>
</html>
